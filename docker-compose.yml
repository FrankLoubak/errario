version: '3.9'

# ─── Docker Compose — Desenvolvimento ──────────────────────────────────────────
# Uso: docker-compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:15-alpine
    container_name: errario_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: errario_user
      POSTGRES_PASSWORD: errario_dev_password
      POSTGRES_DB: errario_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U errario_user -d errario_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: errario_redis_dev
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
