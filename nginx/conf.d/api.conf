# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.errario.app;

    # Certbot ACME challenge (renovação SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — API Backend ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.errario.app;

    ssl_certificate /etc/letsencrypt/live/api.errario.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.errario.app/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.errario.app/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Proxy para o container Node.js
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Health check público
    location /health {
        proxy_pass http://api:3001/api/health;
    }
}
