# Errário Backend — configuração para Easypanel
# Cole este conteúdo em: Easypanel → Create App → Docker Compose → pasta errario
#
# O Traefik do Easypanel cuida do SSL/HTTPS automaticamente.
# Nginx NÃO é necessário — o Traefik já faz o proxy reverso.
#
# Uso:
#   1. No Easypanel, crie um novo projeto chamado "errario"
#   2. Adicione um serviço "api" com este compose
#   3. Configure as variáveis de ambiente no painel
#   4. Configure o domínio: api.errario.app → porta 3001

services:
  api:
    image: ${DOCKER_IMAGE:-frankloubak/errario-backend:latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "30d"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: noreply@errario.app
      APPLE_BUNDLE_ID: com.errario.app
      APPLE_SHARED_SECRET: ${APPLE_SHARED_SECRET}
      GOOGLE_PLAY_PACKAGE_NAME: com.errario.app
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: errario_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: errario_prod
    volumes:
      - errario_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U errario_user -d errario_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - errario_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 160M

volumes:
  errario_postgres_data:
  errario_redis_data:
