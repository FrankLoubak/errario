name: Backend CI/CD

on:
  push:
    branches: [main, feature/**]
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  workflow_dispatch:

jobs:
  # ─── Lint + Tests ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: errario_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: errario_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Gerar Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Executar migrations de teste
        working-directory: backend
        env:
          DATABASE_URL: postgresql://errario_test:test_password@localhost:5432/errario_test
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Testes com coverage
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://errario_test:test_password@localhost:5432/errario_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_muito_longo_para_testes_unitarios_32chars
          JWT_REFRESH_SECRET: test_refresh_secret_muito_longo_para_testes_32chars
        run: npm run test:coverage

      - name: Upload coverage para Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
        continue-on-error: true

  # ─── Build Docker ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build e Push imagem
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/errario-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/errario-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy na VPS ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy VPS Hostinger
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (Easypanel)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Easypanel gerencia o container — atualiza a imagem e reinicia o serviço.
            # O Traefik do Easypanel cuida do SSL/proxy; não usamos docker-compose diretamente.

            # 1. Puxa a nova imagem
            docker pull ${{ secrets.DOCKER_USERNAME }}/errario-backend:latest

            # 2. Executa migrations via container temporário (conecta na rede do Easypanel)
            docker run --rm \
              --network errario_default \
              -e DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}" \
              ${{ secrets.DOCKER_USERNAME }}/errario-backend:latest \
              npx prisma migrate deploy

            # 3. Reinicia o container do Easypanel (nome do container: errario_api_1)
            docker restart $(docker ps -q --filter "name=errario_api") || \
              docker compose -f /etc/easypanel/projects/errario/docker-compose.yml up -d --no-deps api

            # 4. Health check (aguarda container inicializar)
            sleep 15
            curl -f http://localhost:3001/api/health || exit 1

            echo "Deploy concluído: $(date)"
