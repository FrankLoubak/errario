name: Mobile EAS Build

on:
  push:
    branches: [main]
    paths: [mobile/**]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plataforma para build'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]
      profile:
        description: 'Perfil de build'
        required: true
        default: 'preview'
        type: choice
        options: [development, preview, production]

jobs:
  build:
    name: EAS Build (${{ inputs.platform || 'all' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Instalar dependências
        working-directory: mobile
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Lint
        working-directory: mobile
        run: npm run lint

      - name: Testes
        working-directory: mobile
        run: npm run test:ci

      - name: EAS Build
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          PROFILE="${{ inputs.profile || 'preview' }}"
          eas build --platform $PLATFORM --profile $PROFILE --non-interactive

  # Submit para as lojas (apenas com trigger manual em produção)
  submit:
    name: Submeter para as Lojas
    needs: build
    runs-on: ubuntu-latest
    if: inputs.profile == 'production' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit para App Store
        if: inputs.platform == 'ios' || inputs.platform == 'all'
        working-directory: mobile
        run: eas submit --platform ios --non-interactive

      - name: Submit para Play Store
        if: inputs.platform == 'android' || inputs.platform == 'all'
        working-directory: mobile
        run: eas submit --platform android --non-interactive
